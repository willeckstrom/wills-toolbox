function migratePers(old) {

  const out = {};
  Object.keys(old).forEach((k) => {

  });

}

function fmtDate(d) {
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${mm}/${dd}/${d.getFullYear()}`;
}

function fmtLong(d) {
  try { return new Date(d).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }); }
  catch (e) { return ""; }
}

// Tiny stable string hash - used to store a compact "saved signature" instead of duplicating full text.
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = (Math.imul(h, 31) + s.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(36);
}

function slugify(label, existing) {
  let base = label.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "") || "item";
  let key = base, i = 2;
  while (existing.includes(key)) key = `${base}_${i++}`;
  return key;
}

// ===== Rich text helpers =====
function normalizeRich(v) {
  v = String(v ?? "");
  const lines = [];
  if (/<\w+[^>]*>/.test(v) || /&\w+;/.test(v)) {
    const div = document.createElement("div");
    div.innerHTML = v;
    let cur = [];
    const flush = () => { lines.push(cur); cur = []; };
    const walk = (node, b, u) => {
      Array.from(node.childNodes).forEach((n) => {
        if (n.nodeType === 3) {
          String(n.nodeValue).split("\n").forEach((part, i) => { if (i > 0) flush(); if (part) cur.push({ t: part, b, u }); });
        } else if (n.nodeType === 1) {
          const tag = n.tagName;
          if (tag === "BR") { flush(); return; }
          const nb = b || tag === "B" || tag === "STRONG";
          const nu = u || tag === "U";
          const block = tag === "DIV" || tag === "P";
          if (block && cur.length) flush();
          walk(n, nb, nu);
          if (block && cur.length) flush();
        }
      });
    };
    walk(div, false, false);
    if (cur.length) flush();
    return lines.length ? lines : [[]];
  }
  v.split("\n").forEach((line) => {
    const runs = [];
    line.split(/(\*\*[^*]+\*\*)/g).forEach((p) => {
      if (!p) return;
      if (p.startsWith("**") && p.endsWith("**")) runs.push({ t: p.slice(2, -2), b: true, u: false });
      else runs.push({ t: p, b: false, u: false });
    });
    lines.push(runs);
  });
  return lines;
}
const richToPlain = (v) => normalizeRich(v).map((l) => l.map((r) => { let t = r.t; if (r.b) t = `**${t}**`; if (r.u) t = `__${t}__`; return t; }).join("")).join("\n");
const stripRich = (v) => normalizeRich(v).map((l) => l.map((r) => r.t).join("")).join("\n");
const plainToHtml = (v) => {
  if (/<\w+[^>]*>/.test(String(v ?? ""))) return v;
  return normalizeRich(v).map((l) => l.map((r) => {
    let t = String(r.t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    if (r.b) t = `<b>${t}</b>`;
    if (r.u) t = `<u>${t}</u>`;
    return t;
  }).join("") || "<br>").join("<br>");
};

${gen ? `\nGENERAL PERSONALIZATION - the core goal this process achieves, applies to every ${noun}:\n${gen}\n` : ""}

${schemaLines}
}

Each field's instructions use three layers. Here is what each layer is generally trying to accomplish for every ${noun}:
${INSTR_CATS.map((c) => { const v = layerDefs[c.key]; const plain = v ? richToPlain(v).trim() : c.desc; return `- ${c.label}: ${plain}`; }).join("\n")}

  return prompt;
}

// ===== Rich editable area =====
// Auto-growing textarea - expands to fit its full content so nothing is hidden behind a scrollbar.
function AutoTextarea({ value, onChange, className, placeholder }) {
  const ref = useRef(null);
  const wRef = useRef(0);
  // height:0 forces scrollHeight to report the true content height; +4 clears the border so nothing clips.
  const fit = (el) => { if (el) { el.style.height = "0px"; el.style.height = (el.scrollHeight + 4) + "px"; } };
  // Fit immediately, after the next paint, and once more after layout/fonts settle — covers every timing case.
  useEffect(() => {
    const el = ref.current; if (!el) return;
    fit(el);
    const r = requestAnimationFrame(() => fit(el));
    const t = setTimeout(() => fit(el), 90);
    return () => { cancelAnimationFrame(r); clearTimeout(t); };
  }, [value]);
  // Re-fit whenever the rendered width changes (panel open, window resize) so wrapped lines never get hidden.
  useEffect(() => {
    const el = ref.current;
    if (!el || typeof ResizeObserver === "undefined") return;
    const ro = new ResizeObserver(() => { const w = el.clientWidth; if (w !== wRef.current) { wRef.current = w; fit(el); } });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <textarea
      ref={ref}
      value={value}
      placeholder={placeholder}
      onChange={(e) => { onChange(e); fit(e.target); }}
      rows={1}
      className={className}
      style={{ overflow: "hidden", resize: "none" }}
    />
  );
}

function RichArea({ value, onChange, minH = 96, placeholder }) {
  const ref = useRef(null);
  useEffect(() => {
    // Never rewrite the DOM (and blow away the caret) while the user is typing in it.
    if (ref.current && document.activeElement !== ref.current && ref.current.innerHTML !== (value || "")) ref.current.innerHTML = value || "";
  }, [value]);
  const exec = (cmd) => {
    ref.current?.focus();
    document.execCommand(cmd);
    onChange(ref.current.innerHTML);
  };
  return (
    <div className="border border-gray-200 rounded-xl bg-gray-50 overflow-hidden transition-colors focus-within:border-gray-500">
      <div className="flex gap-1 px-2 py-1.5 border-b border-gray-200 bg-white">
        <button type="button" onMouseDown={(e) => { e.preventDefault(); exec("bold"); }} className="w-7 h-7 rounded-md text-sm font-bold text-gray-700 hover:bg-gray-100 transition-colors" title="Bold">B</button>
        <button type="button" onMouseDown={(e) => { e.preventDefault(); exec("underline"); }} className="w-7 h-7 rounded-md text-sm underline text-gray-700 hover:bg-gray-100 transition-colors" title="Underline">U</button>
      </div>
      <div
        ref={ref}
        contentEditable
        suppressContentEditableWarning
        onInput={(e) => onChange(e.currentTarget.innerHTML)}
        data-placeholder={placeholder || ""}
        className="px-3.5 py-2.5 text-sm text-gray-900 focus:outline-none leading-relaxed"
        style={{ minHeight: minH, whiteSpace: "pre-wrap" }}
      />
    </div>
  );
}

          <span className="absolute -inset-1/2" style={{ background: "conic-gradient(transparent 0deg, rgba(255,255,255,.55) 40deg, transparent 90deg)", animation: `orbSheen ${processing ? 1.6 : 4.5}s linear infinite` }} />
          {/* rotating surface banding (planet rotation) */}
          <span className="absolute -inset-1/4" style={{ background: `repeating-linear-gradient(108deg, transparent 0 7px, rgba(255,255,255,.07) 7px 10px, transparent 10px 18px)`, mixBlendMode: "soft-light", animation: `spinSlow ${processing ? 6 : 16}s linear infinite` }} />
          {/* terminator (day/night shading for a 3D planet look) */}
          <span className="absolute inset-0" style={{ background: `radial-gradient(circle at 68% 66%, transparent 40%, rgba(${T.inner},.5) 100%)` }} />
          {/* drifting core specks */}
          <span className="absolute left-1/2 top-1/2 -inset-1/2" style={{ background: "radial-gradient(circle at 60% 70%, rgba(255,255,255,.6), transparent 22%), radial-gradient(circle at 30% 40%, rgba(255,255,255,.4), transparent 18%)", animation: `spinRev ${processing ? 3 : 9}s linear infinite` }} />
        </div>
      </div>
    </div>
  );
}

function ToolApp({ cfg, onExit }) {
  const { appName, noun, theme: T, storageKey } = cfg;
  const nounPl = noun + "s";
  const CORAL = T.accent;          // re-themed accent for this app
  const C_RGB = T.rgb;             // accent as "r,g,b" for rgba()
  const C_LIGHT = T.light;         // light accent shade
  const PAGES = makePages(noun);
  // Per-tool / per-mode built-in defaults for an empty personalization profile.
  const defaultPersFor = (mode) => (cfg.defaultPersByMode && mode && cfg.defaultPersByMode[mode]) || cfg.defaultPers || DEFAULT_PERSONALIZATION;
  const defaultStepsFor = (mode) => ((cfg.defaultStepsByMode && mode && cfg.defaultStepsByMode[mode]) || cfg.defaultSteps || []).slice();
  const D_PERS = defaultPersFor(cfg.modes ? cfg.defaultMode : null);
  const D_OUT = cfg.defaultOutputs || DEFAULT_OUTPUT_FIELDS;
  const D_CHECK = cfg.defaultChecks || DEFAULT_CHECK_TASKS;
  const [logoHover, setLogoHover] = useState(false);
  const [page, setPage] = useState("process");
  const [rfis, setRfis] = useState([]);
  // Transmittal-style apps carry 3 independent personalization profiles selected by a mode switch.
  const [transMode, setTransMode] = useState(cfg.modes ? cfg.defaultMode : null);
  const profilesRef = useRef({});
  const transModeRef = useRef(cfg.modes ? cfg.defaultMode : null); // synchronous source of truth for which profile is active
  const modeLabel = (m) => (cfg.modes && cfg.modes.find((x) => x.id === m)?.label) || m;
  const [pers, setPers] = useState(D_PERS);
  const [generalPers, setGeneralPers] = useState(cfg.defaultGeneral || "");
  const [layerDefs, setLayerDefs] = useState(cfg.defaultLayerDefs ? { ...DEFAULT_LAYER_DEFS, ...cfg.defaultLayerDefs } : DEFAULT_LAYER_DEFS);
  const [persMeta, setPersMeta] = useState({});      // { id: { sig, date } } - last-saved signature + long date
  const [steps, setSteps] = useState(defaultStepsFor(cfg.modes ? cfg.defaultMode : null));            // "Steps to Complete" - personal checklist (per profile)
  const [outputFields, setOutputFields] = useState(D_OUT);
  const [checkTasks, setCheckTasks] = useState(D_CHECK);
  const [docCats, setDocCats] = useState(DEFAULT_DOC_CATS);
  const [projectDocs, setProjectDocs] = useState({});
  const [model, setModel] = useState("claude-sonnet-4-6");
  const [modelMenuOpen, setModelMenuOpen] = useState(false);

  const [apiKey, setApiKey] = useState(() => getApiKey());
  const [apiOn, setApiOn] = useState(() => { try { return localStorage.getItem("anthropic-api-on") !== "0"; } catch (e) { return true; } });
  const [apiKeyOpen, setApiKeyOpen] = useState(false);
  const saveApiKey = (k) => { setApiKey(k); try { localStorage.setItem(API_KEY_STORE, k); } catch (e) {} };
  const toggleApi = () => { setApiOn((v) => { const nv = !v; try { localStorage.setItem("anthropic-api-on", nv ? "1" : "0"); } catch (e) {} return nv; }); };
  const apiLive = !!apiKey && apiOn;

  // ===== API Memory - saved keys, shared across all Toolbox apps =====
  const [apiMemory, setApiMemory] = useState(() => { try { return JSON.parse(localStorage.getItem("anthropic-api-memory") || "[]"); } catch (e) { return []; } });
  const [apiMemLabel, setApiMemLabel] = useState("");
  const persistApiMemory = (arr) => { setApiMemory(arr); try { localStorage.setItem("anthropic-api-memory", JSON.stringify(arr)); } catch (e) {} };
  const saveKeyToMemory = () => {
    const k = (apiKey || "").trim(); if (!k) return;
    if (apiMemory.some((m) => m.key === k)) { setApiMemLabel(""); return; }
    const label = apiMemLabel.trim() || `Key ${apiMemory.length + 1}`;
    persistApiMemory([{ id: Date.now().toString(), label, key: k }, ...apiMemory]);
    setApiMemLabel("");
  };
  const deleteMemoryKey = (id) => persistApiMemory(apiMemory.filter((m) => m.id !== id));
  const maskKey = (k) => (k.length <= 14 ? k : `${k.slice(0, 8)}...${k.slice(-4)}`);

  const [staged, setStaged] = useState([]);
  const [queue, setQueue] = useState([]);
  const [current, setCurrent] = useState(null);
  const [finals, setFinals] = useState([]);
  const [extraContext, setExtraContext] = useState("");
  const processingRef = useRef(false);
  const fileRef = useRef(null);

  const [expanded, setExpanded] = useState(null);
  const [pastGroup, setPastGroup] = useState("recent");
  const [editDraft, setEditDraft] = useState(null);

  const [persField, setPersField] = useState("subject");
  const [persSaved, setPersSaved] = useState(false);
  const [persOpen, setPersOpen] = useState({ format: true });
  const [secOpen, setSecOpen] = useState({ general: true, outputs: true, format: false });
  const [openOut, setOpenOut] = useState(null);
  const [dragIdx, setDragIdx] = useState(null);
  const [fmtOpen, setFmtOpen] = useState("format");
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(null);
  const [newTask, setNewTask] = useState("");

  const [docCat, setDocCat] = useState(DEFAULT_DOC_CATS[0].key);
  const [addingDoc, setAddingDoc] = useState(null);
  const [pendingDoc, setPendingDoc] = useState(null);
  const [docLoading, setDocLoading] = useState(false);
  const [docError, setDocError] = useState(null);
  const [pasteOpen, setPasteOpen] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [pasteName, setPasteName] = useState("");
  const [bankEditOpen, setBankEditOpen] = useState(false);
  const [bankEditText, setBankEditText] = useState("");
  const docFileRef = useRef(null);

  const [pvHover, setPvHover] = useState(null);
  const [pvSel, setPvSel] = useState(null);
  const [pvOpenOuts, setPvOpenOuts] = useState({});
  const [engineBurst, setEngineBurst] = useState(0);
  const [pvBoot, setPvBoot] = useState(null);
  const [pvBootPct, setPvBootPct] = useState(0);
  const [pvScale, setPvScale] = useState(1);
  const [pvH, setPvH] = useState(0);
  const [pvHeadHover, setPvHeadHover] = useState(false);
  const pvInnerRef = useRef(null);

  const stateRef = useRef({});
  stateRef.current = { pers, generalPers, layerDefs, rfis, outputFields, checkTasks, docCats, projectDocs, extraContext, page, expanded, model, persMeta, steps, apiKey, apiOn, transMode };

  const today = new Date();
  const required = new Date(today);
  required.setDate(required.getDate() + 7);

  useEffect(() => {
    if (page === "process") {
      setPvBoot("on");
      setPvBootPct(0);
      const iv = setInterval(() => setPvBootPct((p) => Math.min(100, p + 1.7)), 60);
      const t1 = setTimeout(() => setPvBoot("fade"), 4400);
      const t2 = setTimeout(() => setPvBoot(null), 5100);
      return () => { clearInterval(iv); clearTimeout(t1); clearTimeout(t2); };
    }
  }, [page]);

  // Scale the Process Visual diagram to always fit the window
  useEffect(() => {
    if (page !== "process") return;
    const NAT = 680;
    const recalc = () => {
      const wrap = pvInnerRef.current?.parentElement;
      const avail = wrap ? wrap.clientWidth : window.innerWidth - 48;
      const scale = Math.min(1, avail / NAT);
      setPvScale(scale);
      if (pvInnerRef.current) setPvH(pvInnerRef.current.offsetHeight * scale);
    };
    recalc();
    const t = setInterval(recalc, 500);
    window.addEventListener("resize", recalc);
    return () => { clearInterval(t); window.removeEventListener("resize", recalc); };
  }, [page, pvBoot]);

  const loadedRef = useRef(false);
  const [storageOK, setStorageOK] = useState(true);
  const importRef = useRef(null);

  // Confirm the browser actually lets us persist (Safari on file:// / private mode silently blocks it).
  useEffect(() => {
    try { localStorage.setItem("__tb_probe", "1"); localStorage.removeItem("__tb_probe"); }
    catch (e) { setStorageOK(false); }
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(storageKey);
        if (r?.value) {
          const d = JSON.parse(r.value);
          if (d.rfis) setRfis(d.rfis);
          if (cfg.modes) {
            // Transmittal-style: personalization lives in per-mode profiles.
            const profiles = d.profiles || {};
            profilesRef.current = profiles;
            let mode = d.transMode || cfg.defaultMode;
            if (!cfg.modes.find((m) => m.id === mode)) mode = cfg.defaultMode; // ignore retired modes (e.g. old "neutral")
            transModeRef.current = mode;
            setTransMode(mode);
            const p = profiles[mode] || {};
            setPers(p.pers ? migratePers(p.pers) : defaultPersFor(mode));
            if (p.generalPers) setGeneralPers(p.generalPers);
            if (p.layerDefs) setLayerDefs({ ...DEFAULT_LAYER_DEFS, ...p.layerDefs });
            if (p.persMeta) setPersMeta(p.persMeta);
            setSteps((p.steps && p.steps.length) ? p.steps : defaultStepsFor(mode));
            if (p.outputFields) setOutputFields(p.outputFields);
            if (p.checkTasks) setCheckTasks(p.checkTasks);
          } else {
          if (d.pers) setPers(migratePers(d.pers));
          if (d.generalPers) setGeneralPers(d.generalPers);
          if (d.layerDefs) setLayerDefs({ ...DEFAULT_LAYER_DEFS, ...d.layerDefs });
          if (d.persMeta) setPersMeta(d.persMeta);
          setSteps((d.steps && d.steps.length) ? d.steps : defaultStepsFor(null));
          if (d.outputFields) setOutputFields(d.outputFields);
          if (d.checkTasks) setCheckTasks(d.checkTasks);
          }
          if (d.projectDocs) setProjectDocs(d.projectDocs);
          if (d.model) setModel(d.model);
          if (d.docCats) {
            setDocCats(d.docCats);
            if (d.docCats[0]) setDocCat(d.docCats[0].key);
          } else if (d.projectDocs) {
            const extra = Object.keys(d.projectDocs).filter((k) => (d.projectDocs[k]?.active || (d.projectDocs[k]?.history || []).length) && !DEFAULT_DOC_CATS.some((c) => c.key === k)).map((k) => ({ key: k, label: OLD_DOC_LABELS[k] || k, context: "" }));
            if (extra.length) setDocCats([...DEFAULT_DOC_CATS, ...extra]);
          }
        }
      } catch (e) {}
      loadedRef.current = true;   // enable auto-save only AFTER initial load (never overwrite saved data with defaults)
    })();
  }, []);

  const persist = async (over = {}) => {
    try {
      const s = stateRef.current;
      const persPart = {
        pers: over.pers ?? s.pers,
        generalPers: over.generalPers ?? s.generalPers,
        layerDefs: over.layerDefs ?? s.layerDefs,
        outputFields: over.outputFields ?? s.outputFields,
        checkTasks: over.checkTasks ?? s.checkTasks,
        persMeta: over.persMeta ?? s.persMeta,
        steps: over.steps ?? s.steps,
      };
      const sharedPart = {
        rfis: over.rfis ?? s.rfis,
        docCats: over.docCats ?? s.docCats,
        projectDocs: over.projectDocs ?? s.projectDocs,
        model: over.model ?? s.model,
      };
      let payload;
      if (cfg.modes) {
        const mode = transModeRef.current || cfg.defaultMode;
        profilesRef.current = { ...profilesRef.current, [mode]: persPart };
        payload = { ...sharedPart, transMode: mode, profiles: profilesRef.current };
      } else {
        payload = { ...sharedPart, ...persPart };
      }
      const json = JSON.stringify(payload);
      await window.storage.set(storageKey, json);
      // Read it straight back - if it didn't actually persist, flag it so we can warn the user loudly.
      const back = await window.storage.get(storageKey);
      const ok = !!back && back.value === json;
      setStorageOK(ok);
    } catch (e) { console.error("Storage failed", e); setStorageOK(false); }
  };

  // ===== Auto-save: persist on EVERY change (debounced), so nothing is ever lost without clicking Save =====
  useEffect(() => {
    if (!loadedRef.current) return;
    const t = setTimeout(() => { persist(); }, 450);
    return () => clearTimeout(t);
  }, [pers, generalPers, layerDefs, outputFields, checkTasks, steps, transMode, docCats, projectDocs, model, rfis]);

  // ===== Backup / Restore - portable file so settings survive across browsers AND computers =====
  const BACKUP_KEYS = ["rfi-tool-data", "submittal-tool-data", "transmittal-tool-data", "anthropic-api-memory"];
  const exportAll = () => {
    const data = {};
    BACKUP_KEYS.forEach((k) => { try { const v = localStorage.getItem(k); if (v != null) data[k] = v; } catch (e) {} });
    const blob = new Blob([JSON.stringify({ __willstoolbox: 1, exported: new Date().toISOString(), data }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "wills-toolbox-backup.json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  };
  const importAll = (file) => {
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        const data = parsed.data || parsed;
        Object.keys(data).forEach((k) => { try { localStorage.setItem(k, typeof data[k] === "string" ? data[k] : JSON.stringify(data[k])); } catch (e) {} });
        location.reload();
      } catch (e) { alert("Couldn't read that backup file - make sure it's a Will's Toolbox backup .json."); }
    };
    r.readAsText(file);
  };

  // Swap the active personalization buffer when the Transmittal mode changes.
  const switchMode = (newMode) => {
    if (!cfg.modes || newMode === transModeRef.current) return;
    try { if (document.activeElement && document.activeElement.blur) document.activeElement.blur(); } catch (e) {}
    const old = transModeRef.current;
    profilesRef.current = { ...profilesRef.current, [old]: { pers, generalPers, layerDefs, outputFields, checkTasks, persMeta, steps } };
    transModeRef.current = newMode;
    const p = profilesRef.current[newMode] || {};
    setPers(p.pers ? migratePers(p.pers) : defaultPersFor(newMode));
    setGeneralPers(p.generalPers || "");
    setLayerDefs(p.layerDefs ? { ...DEFAULT_LAYER_DEFS, ...p.layerDefs } : DEFAULT_LAYER_DEFS);
    setOutputFields(p.outputFields || D_OUT);
    setCheckTasks(p.checkTasks || D_CHECK);
    setPersMeta(p.persMeta || {});
    setSteps((p.steps && p.steps.length) ? p.steps : defaultStepsFor(newMode));
    setTransMode(newMode);
    setOpenOut(null); setPersField(null); setFmtOpen("format");
    // Use the freshest shared data (stateRef) so a just-finished RFI can't be overwritten by a stale closure.
    const s = stateRef.current;
    try { window.storage.set(storageKey, JSON.stringify({ rfis: s.rfis, docCats: s.docCats, projectDocs: s.projectDocs, model: s.model, transMode: newMode, profiles: profilesRef.current })); } catch (e) {}
  };

  const pickModel = async (id) => {
    setModel(id);
    setModelMenuOpen(false);
    await persist({ model: id });
  };

  const readBase64 = (f) => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = () => rej(new Error("Read failed"));
    r.readAsDataURL(f);
  });

  const stageFiles = (fileList) => {
    const pdfs = Array.from(fileList || []).filter((f) => f.type === "application/pdf");
    if (!pdfs.length) return;
    setStaged((s) => [...s, ...pdfs.map((f) => ({ id: Date.now().toString() + Math.random().toString(36).slice(2, 7), file: f, name: f.name }))]);
  };

  const submitBatch = () => {
    if (!staged.length) return;
    let ctx = extraContext.trim();
    if (cfg.modes && transMode && transMode !== "neutral") {
      const note = `IMPORTANT: This ${noun} is being prepared for a ${modeLabel(transMode)} - the underlying source document is a ${modeLabel(transMode)}. Treat it as a ${noun} for a ${modeLabel(transMode)} and follow the ${modeLabel(transMode)} conventions and outputs.`;
      ctx = [ctx, note].filter(Boolean).join("\n");
    }
    // Snapshot the active personalization so processing uses the correct profile even if the mode is switched mid-queue.
    const snap = { pers, generalPers, layerDefs, outputFields, checkTasks, docCats, projectDocs, model, mode: transMode };
    setQueue((q) => [...q, ...staged.map((s) => ({ ...s, ctx, snap }))]);
    setStaged([]);
    setExtraContext("");
  };

  useEffect(() => {
    if (processingRef.current || queue.length === 0) return;
    const next = queue[0];
    processingRef.current = true;
    setQueue((q) => q.slice(1));
    setCurrent({ id: next.id, name: next.name });
    (async () => {
      const t = new Date();
      const req = new Date(t);
      req.setDate(req.getDate() + 7);
      let entry;
      try {
        const s = stateRef.current;
        if (!(s.apiKey && s.apiKey.trim() && s.apiOn)) throw new Error("API is off - open the API page, paste your Anthropic key, and turn the system on.");
        const snap = next.snap || s;
        const b64 = await readBase64(next.file);
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: anthropicHeaders(s.apiKey),
          body: JSON.stringify({
            model: snap.model,
            max_tokens: 4096,
            messages: [{ role: "user", content: [
              { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
              { type: "text", text: buildPrompt(snap.pers, snap.outputFields, snap.projectDocs, snap.docCats, next.ctx || "", snap.generalPers, snap.layerDefs, noun) },
            ] }],
          }),
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message || "API error");
        const text = (data.content || []).filter((i) => i.type === "text").map((i) => i.text).join("\n");
        const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
        const checks = {};
        (snap.checkTasks || stateRef.current.checkTasks).forEach((ct) => { checks[ct.key] = false; });
        entry = { id: next.id, fileName: next.name, dateCreated: fmtDate(t), dateRequired: fmtDate(req), ...parsed, checks, tags: "", error: false };
        const newRfis = [entry, ...stateRef.current.rfis];
        setRfis(newRfis);
        await persist({ rfis: newRfis });
      } catch (e) {
        console.error(e);
        entry = { id: next.id, fileName: next.name, subject: e.message || "Processing failed", error: true };
      }
      setFinals((f) => [entry, ...f]);
      setCurrent(null);
      processingRef.current = false;
      setQueue((q) => [...q]);
    })();
  }, [queue, current]);

  const deleteRfi = async (id) => {
    const newRfis = rfis.filter((r) => r.id !== id);
    setRfis(newRfis);
    if (expanded === id) { setExpanded(null); setEditDraft(null); }
    await persist({ rfis: newRfis });
  };

  const startEdit = (rfi) => {
    const d = JSON.parse(JSON.stringify(rfi));
    d.question = plainToHtml(d.question || "");
    d.checks = d.checks || {};
    setExpanded(rfi.id);
    setEditDraft(d);
  };
  const saveEdit = async () => {
    const newRfis = rfis.map((r) => (r.id === editDraft.id ? editDraft : r));
    setRfis(newRfis);
    await persist({ rfis: newRfis });
  };
  const goEditInPast = (id) => {
    const rfi = stateRef.current.rfis.find((r) => r.id === id);
    if (rfi) { setPage("past"); startEdit(rfi); }
  };

  const has = (k) => outputFields.some((f) => f.key === k);
  const customFields = outputFields.filter((f) => !KNOWN_KEYS.includes(f.key));

  const activateVersion = async (catKey, version) => {
    const docs = JSON.parse(JSON.stringify(stateRef.current.projectDocs || {}));
    const cat = docs[catKey] || { active: null, history: [] };
    if (cat.active) cat.history = [cat.active, ...(cat.history || [])];
    cat.active = version;
    docs[catKey] = cat;
    setProjectDocs(docs);
    await persist({ projectDocs: docs });
  };

  const condenseDoc = async () => {
    if (!pendingDoc) return;
    setDocLoading(true); setDocError(null);
    try {
      if (!(apiKey && apiKey.trim() && apiOn)) throw new Error("no-key");
      const b64 = await readBase64(pendingDoc.file);
      const cat = docCats.find((d) => d.key === docCat);
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: anthropicHeaders(apiKey),
        body: JSON.stringify({
          model: stateRef.current.model,
          max_tokens: 4096,
          messages: [{ role: "user", content: [
            { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
            { type: "text", text: `Condense this construction project document into a dense plain-text knowledge bank used for cross-referencing while drafting ${nounPl}. Document type: "${cat?.label || "Project Document"}". ${cat?.context ? `Purpose in this project: ${cat.context}. ` : ""}Extract the most reference-critical information: indexes, schedules, line items, dates, statuses, and sheet/spec references. Be as dense and complete as possible. Respond with plain text only - no preamble, no markdown headers.` },
          ] }],
        }),
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message || "API error");
      const text = (data.content || []).filter((i) => i.type === "text").map((i) => i.text).join("\n").trim();
      if (!text) throw new Error("Empty response");
      await activateVersion(docCat, { id: Date.now().toString(), versionName: pendingDoc.versionName || pendingDoc.file.name, fileName: pendingDoc.file.name, date: fmtDate(new Date()), bank: text });
      setPendingDoc(null);
    } catch (e) {
      console.error(e);
      if (e.message === "no-key") setDocError("No API key set - open 'API Key' in the top bar and paste your Anthropic key, or use Paste Manually below.");
      else setDocError("Couldn't auto-condense this PDF (likely too large - roughly 100 pages max). Use Paste Manually below with the key info instead.");
    }
    setDocLoading(false);
  };

  const savePaste = async () => {
    if (!pasteText.trim()) return;
    await activateVersion(docCat, { id: Date.now().toString(), versionName: pasteName || "Manual entry", fileName: "Manual entry", date: fmtDate(new Date()), bank: pasteText.trim() });
    setPasteOpen(false); setPasteText(""); setPasteName("");
  };

  const restoreVersion = async (catKey, versionId) => {
    const docs = JSON.parse(JSON.stringify(stateRef.current.projectDocs || {}));
    const cat = docs[catKey];
    if (!cat) return;
    const idx = (cat.history || []).findIndex((v) => v.id === versionId);
    if (idx === -1) return;
    const [v] = cat.history.splice(idx, 1);
    if (cat.active) cat.history = [cat.active, ...cat.history];
    cat.active = v;
    setProjectDocs(docs);
    await persist({ projectDocs: docs });
  };

  const deleteVersion = async (catKey, versionId) => {
    const docs = JSON.parse(JSON.stringify(stateRef.current.projectDocs || {}));
    const cat = docs[catKey];
    if (!cat) return;
    cat.history = (cat.history || []).filter((v) => v.id !== versionId);
    setProjectDocs(docs);
    await persist({ projectDocs: docs });
  };

  const saveBankEdit = async () => {
    const docs = JSON.parse(JSON.stringify(stateRef.current.projectDocs || {}));
    if (docs[docCat]?.active) {
      docs[docCat].active.bank = bankEditText;
      setProjectDocs(docs);
      await persist({ projectDocs: docs });
    }
    setBankEditOpen(false);
  };

  const updateDocCat = async (key, patch) => {
    const nd = docCats.map((d) => (d.key === key ? { ...d, ...patch } : d));
    setDocCats(nd);
    await persist({ docCats: nd });
  };

  const addDocCat = async () => {
    if (!addingDoc?.value.trim()) { setAddingDoc(null); return; }
    const key = slugify(addingDoc.value, docCats.map((d) => d.key));
    const nd = [...docCats, { key, label: addingDoc.value.trim(), context: "" }];
    setDocCats(nd);
    setDocCat(key);
    setAddingDoc(null);
    await persist({ docCats: nd });
  };

  const deleteDocCat = async (key) => {
    const nd = docCats.filter((d) => d.key !== key);
    const docs = JSON.parse(JSON.stringify(stateRef.current.projectDocs || {}));
    delete docs[key];
    setDocCats(nd);
    setProjectDocs(docs);
    if (docCat === key) setDocCat(nd[0]?.key);
    await persist({ docCats: nd, projectDocs: docs });
  };

  const renameItem = async () => {
    if (!editing?.value.trim()) { setEditing(null); return; }
    const nf = outputFields.map((f) => (f.key === editing.key ? { ...f, label: editing.value.trim() } : f));
    setOutputFields(nf); await persist({ outputFields: nf });
    setEditing(null);
  };

  const deleteField = async (key) => {
    const nf = outputFields.filter((f) => f.key !== key);
    setOutputFields(nf);
    if (persField === key) setPersField(nf[0]?.key);
    await persist({ outputFields: nf });
  };

  // Drag-to-reorder outputs
  const onOutDragEnter = (idx) => {
    if (dragIdx === null || dragIdx === idx) return;
    setOutputFields((arr) => { const nf = [...arr]; const [m] = nf.splice(dragIdx, 1); nf.splice(idx, 0, m); return nf; });
    setDragIdx(idx);
  };
  const onOutDrop = async () => { setDragIdx(null); await persist(); };

  const addItem = async () => {
    if (!adding?.value.trim()) { setAdding(null); return; }
    const key = slugify(adding.value, outputFields.map((f) => f.key));
    const nf = [...outputFields, { key, label: adding.value.trim() }];
    setOutputFields(nf);
    const np = { ...pers, [key]: {} };
    setPers(np);
    await persist({ outputFields: nf, pers: np });
    setPersField(key);
    setAdding(null);
  };

  // Steps to Complete - personal checklist (per profile)
  const addStep = () => setSteps((s) => [...s, ""]);
  const setStep = (i, v) => setSteps((s) => s.map((x, j) => (j === i ? v : x)));
  const removeStep = (i) => setSteps((s) => s.filter((_, j) => j !== i));

  // Per-output mode (layers vs option bank) + bank item editing
  const setOutputMode = (key, mode) => setPers((p) => ({ ...p, [key]: { ...(p[key] || {}), _mode: mode } }));
  const addBankItem = (key) => setPers((p) => ({ ...p, [key]: { ...(p[key] || {}), _bank: [...((p[key] || {})._bank || []), ""] } }));
  const setBankItem = (key, idx, val) => setPers((p) => { const cur = [...((p[key] || {})._bank || [])]; cur[idx] = val; return { ...p, [key]: { ...(p[key] || {}), _bank: cur } }; });
  const removeBankItem = (key, idx) => setPers((p) => ({ ...p, [key]: { ...(p[key] || {}), _bank: ((p[key] || {})._bank || []).filter((_, i) => i !== idx) } }));
  // Locked-bank publish flow: a draft must be explicitly published before it becomes a real, permanent choice.
  const [bankDraft, setBankDraft] = useState({});
  const publishBankItem = (key) => {
    const d = (bankDraft[key] || "").trim();
    if (!d) return;
    setPers((p) => {
      const cur = (p[key] || {})._bank || [];
      if (cur.some((x) => String(x).trim().toLowerCase() === d.toLowerCase())) return p; // no duplicates
      return { ...p, [key]: { ...(p[key] || {}), _mode: "bank", _bank: [...cur, d] } };
    });
    setBankDraft((b) => ({ ...b, [key]: "" }));
  };

  const addCheckTask = async () => {
    if (!newTask.trim()) return;
    const key = slugify(newTask, checkTasks.map((t) => t.key));
    const nt = [...checkTasks, { key, label: newTask.trim() }];
    setCheckTasks(nt);
    setNewTask("");
    await persist({ checkTasks: nt });
  };

  const renameCheckTask = async (key, label) => {
    const nt = checkTasks.map((t) => (t.key === key ? { ...t, label } : t));
    setCheckTasks(nt);
    await persist({ checkTasks: nt });
  };

  const deleteCheckTask = async (key) => {
    const nt = checkTasks.filter((t) => t.key !== key);
    setCheckTasks(nt);
    await persist({ checkTasks: nt });
  };

  const persSave = async () => {
    const ids = ["general", ...outputFields.map((f) => "output:" + f.key), ...INSTR_CATS.map((c) => "layer:" + c.key)];
    const now = fmtLong(new Date());
    const nm = { ...persMeta };
    ids.forEach((id) => {
      const sig = persSig(id);
      if (!sig) return;
      if (!nm[id] || nm[id].sig !== sig) nm[id] = { sig, date: now };
    });
    setPersMeta(nm);
    await persist({ pers, generalPers, layerDefs, persMeta: nm });
    setPersSaved(true); setTimeout(() => setPersSaved(false), 1500);
  };


  // ===== Personalization "live + last saved" tracking (synced to Process Visual) =====
  // persRaw = the actual content (for liveness); persSig = a short hash of it (stored in persMeta - keeps storage tiny).
  const persRaw = (id) => {
    if (id === "general") return stripRich(generalPers).trim();
    if (id.indexOf("output:") === 0) { const k = id.slice(7); const p = pers[k] || {}; if (p._mode === "bank" || isLockedBank(k)) { const items = (p._bank || []).map((x) => String(x).trim()).filter(Boolean); return items.length ? "BANK§" + items.join("¦") : ""; } return INSTR_CATS.map((c) => stripRich(p[c.key] || "").trim()).join("¦").replace(/¦+$/g, ""); }
    if (id.indexOf("layer:") === 0) return stripRich(layerDefs[id.slice(6)] || "").trim();
    return "";
  };
  const persSig = (id) => { const r = persRaw(id); return r ? hashStr(r) : ""; };
  const persLive = (id) => persRaw(id).length > 0;
  const persSynced = (id) => { const m = persMeta[id]; const sig = persSig(id); return !!m && m.sig === sig && sig.length > 0; };
  const persDate = (id) => persMeta[id]?.date;
  const liveProps = (id) => ({ live: persLive(id), synced: persSynced(id), date: persDate(id), accent: CORAL });

  const activeDoc = projectDocs[docCat]?.active;
  const docHistory = projectDocs[docCat]?.history || [];
  const selectedDocCat = docCats.find((d) => d.key === docCat);
  const activeBankCount = docCats.filter((d) => projectDocs[d.key]?.active).length;

  const inputCls = "w-full bg-white border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:border-gray-500";
  const labelCls = "text-xs uppercase tracking-wider text-gray-500 font-semibold block mb-1";
  const blackBtn = "rounded-full font-semibold text-sm text-white bg-gray-900 hover:bg-black transition-colors";

  // ============ PROCESS VISUAL HELPERS ============
  const isHot = (id) => pvHover === id || pvSel === id;
  const layerLive = (fKey, cKey) => stripRich((pers[fKey] || {})[cKey] || "").trim().length > 0;
  const togglePvSel = (id) => setPvSel((s) => (s === id ? null : id));

  const engineFast = !!current || isHot("engine");
  const BOOT_LINES = ["INITIALIZING AI ENGINE", "LINKING PROJECT MEMORY BANKS", "CALIBRATING PERSONALIZATION VITALS", "SYNCING OUTPUT MATRIX", "SYSTEM ONLINE"];

  // ============ APP ============
  return (
    <div className="min-h-screen text-gray-900" style={{ fontFamily: APPLE_FONT, background: "#fbfbfd" }}>
      <style>{`
        @keyframes brandGlow {0%,100%{box-shadow:0 0 0 1px rgba(${C_RGB},.45), 0 0 10px rgba(${C_RGB},.22)}50%{box-shadow:0 0 0 1px rgba(${C_RGB},.7), 0 0 18px rgba(${C_RGB},.48)}}
        @keyframes lifeline {0%,100%{box-shadow:0 0 12px rgba(52,199,89,.18),0 0 34px rgba(52,199,89,.08)}50%{box-shadow:0 0 26px rgba(52,199,89,.4),0 0 60px rgba(52,199,89,.16)}}
        @keyframes ekg {to{stroke-dashoffset:-280}}
        @keyframes ekgMini {to{stroke-dashoffset:-120}}
        @keyframes pulsedot {0%,100%{opacity:1}50%{opacity:.25}}
        @keyframes fadeUp {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        @keyframes flowY {to{background-position-y:12px}}
        @keyframes flowR {to{background-position-x:12px}}
        @keyframes flowL {to{background-position-x:-12px}}
        @keyframes spinSlow {to{transform:rotate(360deg)}}
        @keyframes spinRev {to{transform:rotate(-360deg)}}
        @keyframes breathe {0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes pvRipple {from{opacity:.9;transform:scale(1)}to{opacity:0;transform:scale(1.08)}}
        @keyframes engineBurstA {from{opacity:.7;transform:scale(1)}to{opacity:0;transform:scale(1.5)}}
        @keyframes checkPop {from{transform:scale(0) rotate(-40deg)}to{transform:scale(1) rotate(0)}}
        @keyframes fillBar {from{width:0%}to{width:100%}}
        @keyframes scanY {0%{transform:translateY(-130%)}100%{transform:translateY(130%)}}
        @keyframes orbSheen {to{transform:rotate(360deg)}}
        @keyframes logoSpin {to{transform:rotate(360deg)}}
        @keyframes gridDrift {to{background-position:30px 30px,30px 30px}}
        @keyframes hudPulse {0%,100%{opacity:.45}50%{opacity:1}}
        @keyframes haloBreathe {0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.08)}}
        @keyframes telemFlick {0%,100%{opacity:1}97%{opacity:1}98%{opacity:.4}99%{opacity:1}}
        @keyframes orbPulse {0%{transform:scale(.62);opacity:.55}100%{transform:scale(1.35);opacity:0}}
        @keyframes uploadPulse {0%{transform:scale(1);opacity:.55}100%{transform:scale(1.7);opacity:0}}
        @keyframes headerSweep {from{transform:translateX(-120%)}to{transform:translateX(340%)}}
        @keyframes flowDown {from{transform:translateY(-120%)}to{transform:translateY(260%)}}
        @keyframes flowRight {from{transform:translateX(-160%)}to{transform:translateX(360%)}}
        @keyframes flowLeft {from{transform:translateX(360%)}to{transform:translateX(-160%)}}
        @keyframes waveSlide {to{stroke-dashoffset:-300}}
        @keyframes emblemSpin {to{transform:rotate(360deg)}}
        @keyframes dashTravel {to{stroke-dashoffset:-100}}
        [contenteditable][data-placeholder]:empty:before{content:attr(data-placeholder);color:#9ca3af;pointer-events:none;display:block;}
      `}</style>

      {/* Nav */}
      <div className="sticky top-0 z-20 border-b border-gray-200" style={{ background: "rgba(251,251,253,.85)", backdropFilter: "blur(16px)" }}>
        <div className="max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
          {/* Logo - glowing accent-themed brand - click to return to Will's Toolbox */}
          <button onClick={onExit} onMouseEnter={() => setLogoHover(true)} onMouseLeave={() => setLogoHover(false)} className="flex items-center gap-2.5 group rounded-full pl-1.5 pr-4 py-1.5 bg-white transition-transform duration-300 hover:scale-[1.03]" title="Back to Will's Toolbox" style={{ animation: "brandGlow 3s ease-in-out infinite" }}>
            <span className="relative transition-all duration-300 group-hover:scale-110" style={{ filter: `drop-shadow(0 4px 14px rgba(${C_RGB},${logoHover || current ? 0.65 : 0.3}))` }}>
              <EngineOrb px={34} processing={!!current} active={logoHover} T={T} />
            </span>
            <span className="text-left leading-tight">
              <span className="block font-bold tracking-tight text-[14px] transition-colors duration-300" style={{ color: logoHover ? CORAL : INK }}>{appName}</span>
              <span className="block text-[8px] leading-tight uppercase tracking-wider" style={{ color: CORAL }}>Will's Toolbox</span>
            </span>
          </button>

          <div className="flex items-center gap-2">
            {/* Pages - segmented control (API is a page with a live status light) */}
            <div className="flex items-center gap-0.5 p-1 rounded-full bg-gray-100 border border-gray-200" style={{ boxShadow: "inset 0 1px 2px rgba(0,0,0,.05)" }}>
              {PAGES.map((p) => {
                const Icon = p.icon;
                const active = page === p.id;
                const isApi = p.id === "api";
                return (
                  <button key={p.id} onClick={() => setPage(p.id)} title={isApi ? (apiLive ? "API - connected" : "API - off") : p.label}
                    className={`relative flex items-center gap-1.5 rounded-full px-3 py-1.5 text-xs font-semibold transition-all duration-300 ${active ? "text-gray-900" : "text-gray-400 hover:text-gray-700"}`}>
                    {active && <span className="absolute inset-0 rounded-full bg-white" style={{ boxShadow: "0 1px 3px rgba(0,0,0,.13)" }} />}
                    <span className="relative flex items-center gap-1.5">
                      {isApi

                                                <button onClick={() => removeBankItem(f.key, idx)} className="text-gray-300 hover:text-red-500 p-1 shrink-0"><X size={14} /></button>
                                              </div>
                                            )
                                          ))}
                                        </div>
                                        {locked ? (
                                          <div className="flex gap-2">
                                            <input value={bankDraft[f.key] || ""} onChange={(e) => setBankDraft((b) => ({ ...b, [f.key]: e.target.value }))} onKeyDown={(e) => e.key === "Enter" && publishBankItem(f.key)} placeholder="New answer choice..." className={inputCls} />
                                            <button onClick={() => publishBankItem(f.key)} disabled={!(bankDraft[f.key] || "").trim()} className={blackBtn + " px-4 disabled:bg-gray-200 disabled:text-gray-400 flex items-center gap-1.5 shrink-0"}><Check size={15} /> Publish</button>

                                        ) : (
                                          <button onClick={() => addBankItem(f.key)} className="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-[12px] font-semibold text-gray-500 hover:text-gray-900 border border-dashed border-gray-300 hover:border-gray-400 transition-all"><Plus size={14} /> Add answer choice</button>

                                      </div>
                                    ) : (
                                      <PersLayerCard fKey={f.key} pers={pers} setPers={setPers} persOpen={persOpen} setPersOpen={setPersOpen} />

                            </div>
                          )}
                        </div>
                      );
                    })}
                    {adding ? (
                      <div className="flex items-center gap-1 p-1">
                        <input autoFocus value={adding.value} onChange={(e) => setAdding({ ...adding, value: e.target.value })} onKeyDown={(e) => e.key === "Enter" && addItem()} placeholder="New output name..." className="flex-1 min-w-0 bg-white border border-gray-300 rounded px-2 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none" />

                      </div>

                      <button onClick={() => setAdding({ value: "" })} className="w-full flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-400 hover:text-gray-900 border border-dashed border-gray-300 hover:border-gray-400 transition-all"><Plus size={15} /> Add Output</button>

                  </div>
                )}
              </div>

              {/* SECTION 3 - Personalization Format (global layer definitions) */}
              <div className="bg-white border border-gray-200 rounded-2xl overflow-hidden" style={{ boxShadow: "0 1px 3px rgba(0,0,0,.05)" }}>
                <button onClick={() => setSecOpen((o) => ({ ...o, format: !o.format }))} className="w-full flex items-center gap-3 px-5 py-4 hover:bg-gray-50 transition-colors text-left">
                  <span className="w-6 h-6 rounded-full flex items-center justify-center text-[11px] font-bold shrink-0 text-white" style={{ background: INK }}>3</span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-bold text-gray-900">Personalization Format</div>
                    <div className="text-[11px] text-gray-400 truncate">Define what Format - Examples - Analysis each do for all {nounPl}</div>
                  </div>
                  {secOpen.format ? <ChevronDown size={16} className="text-gray-400 shrink-0" /> : <ChevronRight size={16} className="text-gray-400 shrink-0" />}
                </button>
                {secOpen.format && (
                  <div className="px-5 pb-5 border-t border-gray-100 pt-4 space-y-2" style={{ animation: "fadeUp .2s ease both" }}>
                    <p className="text-[11px] text-gray-400 leading-relaxed mb-1">The master definition of each layer - what that step is generally trying to accomplish on every {noun}. Each output above then fills in its own specifics within these definitions.</p>
                    {INSTR_CATS.map((c) => {
                      const open = fmtOpen === c.key;
                      const live = stripRich(layerDefs[c.key] || "").trim().length > 0;
                      return (
                        <div key={c.key} className="border border-gray-200 rounded-xl overflow-hidden bg-gray-50">
                          <button onClick={() => setFmtOpen(open ? null : c.key)} className="w-full flex items-center gap-2 px-3 py-2.5 hover:bg-gray-100 transition-colors text-left">
                            {open ? <ChevronDown size={14} className="text-gray-400 shrink-0" /> : <ChevronRight size={14} className="text-gray-400 shrink-0" />}
                            <span className="text-sm font-bold text-gray-900">{c.label}</span>
                            <span className="text-[10px] text-gray-400 truncate flex-1">defines "{c.label}" for every {noun}</span>
                            <PersLive {...liveProps("layer:" + c.key)} />
                          </button>
                          {open && (
                            <div className="px-3 pb-3 pt-2 bg-white border-t border-gray-200" style={{ animation: "fadeUp .2s ease both" }}>
                              <RichArea key={"def-" + c.key} value={plainToHtml(layerDefs[c.key] || "")} onChange={(html) => setLayerDefs((d) => ({ ...d, [c.key]: html }))} minH={92} placeholder={`Define what ${c.label} generally does for every ${noun}...`} />
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              <button onClick={persSave} className={`w-full py-3 rounded-full font-semibold text-sm flex items-center justify-center gap-2 text-white transition-colors ${persSaved ? "" : "bg-gray-900 hover:bg-black"}`} style={persSaved ? { background: GREEN } : {}}>
                {persSaved ? (<><Check size={16} /> Saved</>) : (<><Save size={16} /> Save Personalization</>)}
              </button>
            </div>
          </div>
        )}

        {/* ============ API & SYSTEM AI ============ */}
        {page === "api" && (
          <div className="max-w-2xl mx-auto">
            <h2 className="text-2xl font-semibold tracking-tight text-gray-900 mb-1">API &amp; System AI</h2>
            <p className="text-xs text-gray-500 mb-6">The engine behind every {noun}. Flip the whole system AI on or off, and manage the Anthropic connection.</p>

            {/* Big master on / off */}
            <button onClick={toggleApi} disabled={!apiKey} className="w-full rounded-3xl border-2 p-6 flex items-center gap-5 transition-all disabled:opacity-60 disabled:cursor-not-allowed" style={{ borderColor: apiLive ? "rgba(52,199,89,.5)" : "rgba(255,59,48,.4)", background: apiLive ? "rgba(52,199,89,.05)" : "rgba(255,59,48,.04)", animation: apiLive ? "lifeline 2.4s ease-in-out infinite" : "none" }}>
              <div className="relative w-16 h-16 rounded-full flex items-center justify-center shrink-0" style={{ background: apiLive ? GREEN : RED, boxShadow: `0 0 26px ${apiLive ? "rgba(52,199,89,.55)" : "rgba(255,59,48,.45)"}` }}>
                <Power size={28} className="text-white" strokeWidth={2.5} />
              </div>
              <div className="text-left flex-1 min-w-0">
                <div className="text-xl font-bold text-gray-900">System AI {apiLive ? "On" : "Off"}</div>
                <div className="text-sm text-gray-500">{!apiKey ? "Add an API key below to enable the system." : apiLive ? "Live - every query runs through Claude." : "Switched off - no AI calls will run."}</div>

              <span className="relative w-16 h-9 rounded-full shrink-0 transition-colors duration-300" style={{ background: apiLive ? GREEN : "#d1d5db" }}>

            </button>

            {/* Login / credentials */}
            <div className="mt-6 bg-white border border-gray-200 rounded-2xl p-5" style={{ boxShadow: "0 1px 3px rgba(0,0,0,.05)" }}>

              <div className="text-[10px] text-gray-400 mt-3 leading-relaxed">Heads up: a browser-embedded key is visible to anyone who can open this page - fine for personal/local use. Model is chosen on the New {noun} page.</div>

              ) : (
                <div className="space-y-2">
                  {apiMemory.map((m) => {
                    const isActive = m.key === (apiKey || "").trim();
                    return (
                      <div key={m.id} className="flex items-center gap-3 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5">
                        <KeyRound size={15} className="text-gray-400 shrink-0" />
                        <div className="flex-1 min-w-0">
                          <div className="text-sm font-semibold text-gray-900 truncate flex items-center gap-2">{m.label}{isActive && <span className="text-[9px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded" style={{ background: `rgba(${C_RGB},.12)`, color: CORAL }}>In use</span>}</div>
                          <div className="text-[11px] text-gray-400 font-mono truncate">{maskKey(m.key)}</div>
                        </div>
                        <button onClick={() => saveApiKey(m.key)} disabled={isActive} className="text-xs font-semibold rounded-full px-3.5 py-2 transition-colors shrink-0 disabled:opacity-40" style={{ background: `rgba(${C_RGB},.1)`, color: CORAL }} title="Plug this key into the active slot">{isActive ? "Active" : "Use"}</button>
                        <button onClick={() => deleteMemoryKey(m.id)} className="text-gray-300 hover:text-red-500 p-1.5 shrink-0" title="Forget this key"><Trash2 size={15} /></button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Backup & Restore - portable file that moves your setup across browsers and computers */}
            <div className="mt-6 bg-white border border-gray-200 rounded-2xl p-5" style={{ boxShadow: "0 1px 3px rgba(0,0,0,.05)" }}>
              <div className="flex items-center gap-2 mb-1.5">
                <Download size={15} className="text-gray-500" />
                <span className="text-sm font-bold text-gray-900">Backup &amp; Restore</span>
              </div>
              <p className="text-[11px] text-gray-500 leading-relaxed mb-3">Your data lives in this browser only - it can't move between computers on its own. <span className="font-semibold">Export</span> downloads one file with all three tools' personalization + saved keys; <span className="font-semibold">Import</span> it on another computer (or after clearing your browser) to restore everything exactly.</p>
              <input ref={importRef} type="file" accept="application/json" className="hidden" onChange={(e) => { const f = e.target.files[0]; if (f) importAll(f); e.target.value = ""; }} />
              <div className="flex gap-2">
                <button onClick={exportAll} className={blackBtn + " px-4 py-2.5 flex items-center gap-2"}><Download size={15} /> Export backup</button>
                <button onClick={() => importRef.current?.click()} className="px-4 py-2.5 rounded-full font-semibold text-sm bg-gray-100 hover:bg-gray-200 text-gray-900 flex items-center gap-2 transition-colors border border-gray-300"><Upload size={15} /> Import backup</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Streams a Claude reply, calling onDelta(textChunk) as tokens arrive.
async function streamClaude({ model, system, messages, signal, onDelta }) {
  // Merge consecutive same-role turns so the API always sees alternating roles.
  const merged = [];
  for (const m of messages) {
    const last = merged[merged.length - 1];
    if (last && last.role === m.role) last.content += "\n\n" + m.content;
    else merged.push({ role: m.role, content: m.content });
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: anthropicHeaders(),
    signal,
    body: JSON.stringify({ model, max_tokens: 8192, system, messages: merged, stream: true }),
  });
  if (!res.ok) {
    let msg = `API error ${res.status}`;
    try { const j = await res.json(); msg = (j && j.error && j.error.message) || msg; } catch (e) {}
    throw new Error(msg);
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const parts = buf.split("\n\n");
    buf = parts.pop();
    for (const part of parts) {
      for (const line of part.split("\n")) {
        if (!line.startsWith("data:")) continue;
        const data = line.slice(5).trim();
        if (!data || data === "[DONE]") continue;
        try {
          const ev = JSON.parse(data);
          if (ev.type === "content_block_delta" && ev.delta && ev.delta.type === "text_delta") onDelta(ev.delta.text);
        } catch (e) {}
      }
    }
  }
}

// Tiny markdown renderer for chat bubbles (code fences, inline code, bold, italics, headers, lists, links).
function mdEscape(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function mdRender(src) {
  const fences = [];
  let s = mdEscape(src || "");
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    fences.push(`<pre style="background:#1d1d1f;color:#f5f5f7;padding:12px 14px;border-radius:12px;overflow-x:auto;font-size:12px;line-height:1.55;margin:8px 0"><code>${code.replace(/\n$/, "")}</code></pre>`);
    return `@@FENCE${fences.length - 1}@@`;
  });
  s = s.replace(/`([^`\n]+)`/g, '<code style="background:rgba(0,0,0,.07);padding:1px 5px;border-radius:5px;font-size:.9em">$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>");
  s = s.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g, "$1<i>$2</i>");
  s = s.replace(/^#{3,} (.*)$/gm, '<div style="font-weight:700;font-size:14px;margin:10px 0 2px">$1</div>');
  s = s.replace(/^## (.*)$/gm, '<div style="font-weight:700;font-size:15px;margin:12px 0 2px">$1</div>');
  s = s.replace(/^# (.*)$/gm, '<div style="font-weight:700;font-size:16px;margin:12px 0 2px">$1</div>');
  s = s.replace(/^[ \t]*[-*] (.*)$/gm, '<div style="display:flex;gap:8px;margin:2px 0"><span style="color:#9ca3af">&#8226;</span><span>$1</span></div>');
  s = s.replace(/^[ \t]*(\d+)\. (.*)$/gm, '<div style="display:flex;gap:8px;margin:2px 0"><span style="min-width:16px;color:#6e6e73">$1.</span><span>$2</span></div>');
  s = s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer" style="color:#5B5BD6;text-decoration:underline">$1</a>');
  s = s.replace(/(<\/div>)\n/g, "$1");
  s = s.replace(/\n{2,}/g, '<div style="height:9px"></div>');
  s = s.replace(/\n/g, "<br/>");
  s = s.replace(/@@FENCE(\d+)@@/g, (m, i) => fences[+i]);
  return s;
}

          {APPS.map((c) => (
            <button key={c.id} onClick={() => openTool(c.id)} title={`Open ${c.appName}`} className="hidden sm:flex items-center gap-1.5 rounded-full border px-2.5 py-1.5 text-[11px] font-semibold bg-white hover:-translate-y-0.5 transition-all" style={{ borderColor: "#e5e7eb", color: c.theme.dark }}>
              <EngineOrb px={16} T={c.theme} /> {c.appName.replace(" Tool", "")}
            </button>
          ))}
          <span className="w-px h-5 bg-gray-200 mx-1" />
          <div className="relative">
            <button onClick={() => setModelOpen((v) => !v)} className="flex items-center gap-1.5 rounded-full border px-3 py-1.5 text-[11px] font-semibold bg-white hover:bg-gray-50 transition-colors" style={{ borderColor: "#e5e7eb", color: INK }}>
              <Cpu size={12} style={{ color: T.accent }} /> {curModel.name} <ChevronDown size={11} className={`transition-transform ${modelOpen ? "rotate-180" : ""}`} />
            </button>
            {modelOpen && (
              <div className="absolute right-0 mt-2 w-56 rounded-2xl border bg-white shadow-xl p-1.5" style={{ borderColor: "#e5e7eb" }}>
                {MODELS.map((m) => (
                  <button key={m.id} onClick={() => { setModelPersist(m.id); setModelOpen(false); }} className={`w-full flex items-center justify-between rounded-xl px-3 py-2 text-left hover:bg-gray-50 transition-colors ${m.id === model ? "bg-gray-50" : ""}`}>
                    <span><span className="font-semibold block text-[12px]" style={{ color: INK }}>{m.name}</span><span className="text-[10px] text-gray-400">{m.tag}</span></span>
                    {m.id === model && <Check size={13} style={{ color: T.accent }} />}
                  </button>
                ))}
              </div>
            )}
          </div>
          <div className="relative">
            <button onClick={() => { setKeyDraft(""); setKeyOpen((v) => !v); }} title="Anthropic API key" className="relative w-8 h-8 rounded-full border bg-white flex items-center justify-center hover:bg-gray-50 transition-colors" style={{ borderColor: "#e5e7eb" }}>
              <KeyRound size={13} style={{ color: apiKey ? GREEN : "#9ca3af" }} />
              <span className="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full border border-white" style={{ background: apiKey ? GREEN : RED }} />
            </button>
            {keyOpen && (
              <div className="absolute right-0 mt-2 w-72 rounded-2xl border bg-white shadow-xl p-4" style={{ borderColor: "#e5e7eb" }}>
                <div className="text-[11px] font-bold uppercase tracking-wider mb-1" style={{ color: INK }}>Anthropic API Key</div>
                <p className="text-[10.5px] text-gray-400 leading-relaxed mb-2">Shared with every tool in the Toolbox. Stored only in this browser.</p>
                <div className="flex gap-1.5">
                  <input type="password" value={keyDraft} onChange={(e) => setKeyDraft(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && keyDraft.trim()) saveKey(keyDraft.trim()); }} placeholder={apiKey ? maskChatKey(apiKey) : "sk-ant-..."} className="flex-1 min-w-0 rounded-lg border px-2.5 py-1.5 text-[11px] focus:outline-none focus:border-gray-400" style={{ borderColor: "#e5e7eb" }} />
                  <button onClick={() => { if (keyDraft.trim()) saveKey(keyDraft.trim()); }} className="rounded-lg px-3 py-1.5 text-[11px] font-bold text-white transition-transform active:scale-95" style={{ background: T.accent }}>Save</button>
                </div>
                {apiMemory.length > 0 && (
                  <div className="mt-3">
                    <div className="text-[9px] uppercase tracking-wider font-bold text-gray-400 mb-1">API Memory</div>
                    {apiMemory.map((m) => (
                      <button key={m.id} onClick={() => saveKey(m.key)} className="w-full flex items-center justify-between rounded-lg px-2 py-1.5 hover:bg-gray-50 text-[11px] transition-colors">
                        <span className="font-semibold" style={{ color: INK }}>{m.label}</span>
                        <span className="text-gray-400">{maskChatKey(m.key)}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
          <button onClick={() => setHelpOpen(true)} title="Instructions" className="w-8 h-8 rounded-full border bg-white flex items-center justify-center text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition-colors" style={{ borderColor: "#e5e7eb" }}>
            <HelpCircle size={14} />
          </button>
        </div>
      </header>

      <div className="flex flex-1 min-h-0">
        {/* ===== Sidebar - saved chats ===== */}
        <aside className="w-64 shrink-0 border-r flex flex-col bg-white/60" style={{ borderColor: "#eceef1" }}>
          <div className="p-3">
            <button onClick={newChat} className="w-full flex items-center justify-center gap-2 rounded-xl px-3.5 py-2.5 text-sm font-semibold text-white transition-all hover:scale-[1.02] active:scale-95" style={{ background: T.accent, boxShadow: `0 6px 16px rgba(${T.rgb},.3)` }}>
              <SquarePen size={15} /> New Chat
            </button>
          </div>
          <div className="px-4 pb-1 text-[10px] uppercase tracking-wider font-bold text-gray-400">Chats</div>
          <div className="flex-1 overflow-y-auto px-2 pb-2 space-y-0.5">
            {sorted.map((c) => (
              <div key={c.id} onClick={() => openChat(c.id)} className="group flex items-center gap-1.5 rounded-xl px-2.5 py-2 cursor-pointer transition-colors" style={{ background: c.id === store.activeId ? T.lighter : "transparent" }}>
                <MessageSquare size={13} className="shrink-0" style={{ color: c.id === store.activeId ? T.accent : "#c7c7cc" }} />
                <span className="flex-1 truncate text-[12.5px]" style={{ color: INK, fontWeight: c.id === store.activeId ? 600 : 400 }}>{c.title || "Untitled chat"}</span>
                <button onClick={(e) => { e.stopPropagation(); deleteChat(c.id); }} title="Delete chat" className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all p-1"><Trash2 size={12} /></button>
              </div>
            ))}
            {chats.length === 0 && <div className="px-3 py-2 text-[11px] text-gray-400 leading-relaxed">No chats yet - conversations save here automatically.</div>}
          </div>
          <div className="p-3 border-t" style={{ borderColor: "#eceef1" }}>
            <button onClick={() => setHelpOpen(true)} className="w-full flex items-center gap-2 rounded-xl px-3 py-2 text-[11.5px] font-semibold text-gray-500 hover:bg-gray-50 transition-colors">
              <HelpCircle size={13} style={{ color: T.accent }} /> Instructions &amp; new Toolbox
            </button>
          </div>
        </aside>

        {/* ===== Conversation ===== */}
        <main className="flex-1 flex flex-col min-w-0">
          {!active || active.messages.length === 0 ? (
            <div className="flex-1 overflow-y-auto flex items-center justify-center px-6">
              <div className="text-center max-w-lg" style={{ animation: "fadeUp .5s ease both" }}>
                <div className="flex justify-center mb-4" style={{ filter: `drop-shadow(0 10px 26px rgba(${T.rgb},.4))`, animation: "floaty 6s ease-in-out infinite" }}><EngineOrb px={86} T={T} /></div>
                <div className="text-2xl font-semibold tracking-tight" style={{ background: `linear-gradient(95deg, ${INK}, ${T.accent})`, WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>What are we working on, Will?</div>
                <p className="text-xs text-gray-400 mt-1.5">Your everyday chat - the rest of the Toolbox is one click away up top.</p>
                <div className="flex flex-wrap justify-center gap-2 mt-5">
                  {CHAT_SUGGESTIONS.map((sg) => (
                    <button key={sg} onClick={() => send(sg)} className="rounded-full border bg-white px-3.5 py-2 text-[11.5px] text-gray-600 hover:-translate-y-0.5 hover:shadow-sm transition-all" style={{ borderColor: "#e5e7eb" }}>{sg}</button>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            <div className="flex-1 overflow-y-auto px-6 py-6">
              <div className="max-w-3xl mx-auto space-y-5">
                {active.messages.map((m, i) => m.role === "user" ? (
                  <div key={i} className="flex justify-end">
                    <div className="max-w-[80%] rounded-3xl rounded-br-lg px-4 py-3 text-sm leading-relaxed whitespace-pre-wrap" style={{ background: T.lighter, color: INK }}>{m.content}</div>
                  </div>
                ) : (
                  <div key={i} className="flex gap-3 group">
                    <span className="shrink-0 mt-1" style={{ filter: `drop-shadow(0 3px 8px rgba(${T.rgb},.35))` }}><EngineOrb px={26} T={T} /></span>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm leading-relaxed" style={{ color: INK }} dangerouslySetInnerHTML={{ __html: mdRender(m.content) }} />
                      <button onClick={() => copyMsg(m.content, i)} className="mt-1.5 opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-1 text-[10px] font-semibold text-gray-400 hover:text-gray-600">
                        {copied === i ? <React.Fragment><Check size={11} style={{ color: GREEN }} /> Copied</React.Fragment> : <React.Fragment><Copy size={11} /> Copy</React.Fragment>}
                      </button>
                    </div>
                  </div>
                ))}
                {busy && (
                  <div className="flex gap-3">
                    <span className="shrink-0 mt-1" style={{ filter: `drop-shadow(0 3px 8px rgba(${T.rgb},.45))` }}><EngineOrb px={26} processing T={T} /></span>
                    <div className="min-w-0 flex-1 text-sm leading-relaxed" style={{ color: INK }}>
                      {stream ? <span dangerouslySetInnerHTML={{ __html: mdRender(stream) }} /> : <span className="text-gray-400" style={{ animation: "pulsedot 1.4s ease-in-out infinite" }}>Thinking&hellip;</span>}
                      {stream && <span className="inline-block w-1.5 h-3.5 ml-0.5 align-middle rounded-sm" style={{ background: T.accent, animation: "pulsedot 1s ease-in-out infinite" }} />}
                    </div>
                  </div>
                )}
                <div ref={endRef} />
              </div>
            </div>
          )}

          {/* ===== Composer ===== */}
          <div className="px-6 pb-5 pt-2">
            <div className="max-w-3xl mx-auto">
              {err && (
                <div className="mb-2 flex items-center gap-2 text-[11.5px] rounded-xl border px-3 py-2" style={{ borderColor: "#fecaca", background: "#fef2f2", color: "#b91c1c" }}>
                  <AlertCircle size={13} className="shrink-0" /> {err}
                </div>
              )}
              {!apiKey && !err && (
                <div className="mb-2 flex items-center justify-between gap-2 rounded-xl border px-3 py-2 text-[11.5px]" style={{ borderColor: T.light, background: T.lighter, color: T.dark }}>
                  <span className="flex items-center gap-2"><KeyRound size={13} /> Add your Anthropic API key to start chatting.</span>
                  <button onClick={() => setKeyOpen(true)} className="font-bold underline shrink-0">Add key</button>
                </div>
              )}
              <ChatBox onSend={send} busy={busy} onStop={stopStream} accent={T.accent} />
              <div className="text-center text-[9.5px] text-gray-300 mt-2">Chats save automatically in this browser &middot; {curModel.name}</div>
            </div>
          </div>
        </main>
      </div>

      {helpOpen && <ChatHelpModal onClose={() => setHelpOpen(false)} />}
    </div>
  );
}

function Toolbox() {
  const [phase, setPhase] = useState("landing"); // landing -> launch
  const [app, setApp] = useState("chat");        // Main Chat is the Toolbox home screen
  const TB = THEMES.toolbox;

  if (phase !== "landing" && app === "chat") return <ChatApp onExit={() => setApp(null)} openTool={(id) => setApp(id)} />;
  const chosen = APPS.find((a) => a.id === app);
  if (chosen) return <ToolApp cfg={chosen} onExit={() => setApp("chat")} />;

  // ===== Will's Toolbox 5s landing =====
  if (phase === "landing") {
    return (
      <div onClick={() => { setPhase("launch"); setApp("chat"); }} className="fixed inset-0 flex flex-col items-center justify-center cursor-pointer overflow-hidden" style={{ background: "#fbfbfd", fontFamily: APPLE_FONT }}>
        <style>{TB_KEYFRAMES}</style>
        <div className="absolute inset-0 pointer-events-none" style={{ backgroundImage: `linear-gradient(${INK} 1px, transparent 1px), linear-gradient(90deg, ${INK} 1px, transparent 1px)`, backgroundSize: "34px 34px, 34px 34px", opacity: 0.04, WebkitMaskImage: "radial-gradient(ellipse 60% 55% at 50% 50%, #000 20%, transparent 78%)", maskImage: "radial-gradient(ellipse 60% 55% at 50% 50%, #000 20%, transparent 78%)" }} />
        <div className="absolute left-1/2 top-1/2 pointer-events-none" style={{ width: 560, height: 560, transform: "translate(-50%,-50%)", background: `radial-gradient(circle, rgba(${TB.rgb},.16), transparent 64%)`, filter: "blur(30px)", animation: "haloBreathe 4s ease-in-out infinite" }} />
        <div className="relative flex flex-col items-center">
          <div style={{ animation: "landIn 1.1s cubic-bezier(.16,1,.3,1) both" }}>
            <ToolboxOrb />
          </div>
          <div className="-mt-2 text-[44px] leading-none font-semibold tracking-tight" style={{ animation: "landIn 1s cubic-bezier(.16,1,.3,1) .35s both", background: `linear-gradient(95deg, ${INK}, ${TB.accent})`, WebkitBackgroundClip: "text", backgroundClip: "text", color: "transparent" }}>Will's Toolbox</div>
          <div className="relative mt-3 h-px w-60 overflow-hidden" style={{ background: "rgba(0,0,0,.08)", animation: "landIn .8s ease .7s both" }}>
            <div className="absolute top-0 h-full w-1/2" style={{ background: `linear-gradient(90deg, transparent, ${TB.accent}, transparent)`, animation: "landScan 1.6s linear .9s infinite" }} />
          </div>
          <div className="mt-3 text-xs tracking-wide" style={{ color: "#9ca3af", animation: "landIn .9s ease 1s both" }}>By Will Eckstrom</div>
        </div>
        <div className="absolute bottom-10 flex items-center gap-2 text-[10px] uppercase tracking-[0.3em] text-gray-400" style={{ animation: "hintPulse 2.6s ease-in-out infinite" }}>
          <span className="w-1.5 h-1.5 rounded-full" style={{ background: TB.accent }} />
          Click anywhere to enter
        </div>
      </div>
    );
  }

  // ===== Application launcher =====
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden" style={{ background: "#fbfbfd", fontFamily: APPLE_FONT }}>
      <style>{TB_KEYFRAMES}</style>
      <div className="absolute inset-0 pointer-events-none" style={{ backgroundImage: `linear-gradient(${INK} 1px, transparent 1px), linear-gradient(90deg, ${INK} 1px, transparent 1px)`, backgroundSize: "32px 32px, 32px 32px", opacity: 0.03, WebkitMaskImage: "radial-gradient(ellipse 70% 60% at 50% 45%, #000 25%, transparent 80%)", maskImage: "radial-gradient(ellipse 70% 60% at 50% 45%, #000 25%, transparent 80%)" }} />
      {/* Top-left: replay the intro landing */}
      <button onClick={() => setPhase("landing")} className="absolute top-5 left-5 z-20 flex items-center gap-2 group" title="Replay intro" style={{ animation: "fadeUp .6s ease both" }}>
        <span className="transition-transform group-hover:scale-110" style={{ filter: `drop-shadow(0 3px 10px rgba(${TB.rgb},.45))` }}><EngineOrb px={30} processing={false} active={false} T={TB} /></span>
        <span className="text-left leading-tight">
          <span className="block font-bold tracking-tight text-[13px]" style={{ color: INK }}>Will's Toolbox</span>
          <span className="block text-[8px] uppercase tracking-wider text-gray-400 group-hover:text-gray-600 transition-colors">Replay intro</span>
        </span>
      </button>
      <div className="relative z-10 text-center mb-10" style={{ animation: "fadeUp .6s ease both" }}>
        <div className="flex items-center justify-center gap-2 mb-3">
          <span className="w-2 h-2 rounded-full" style={{ background: GREEN, animation: "pulsedot 2s ease-in-out infinite" }} />
          <span className="text-[10px] uppercase tracking-[0.25em] font-bold" style={{ color: INK }}>Will's Toolbox</span>
        </div>
        <h1 className="text-4xl font-semibold tracking-tight" style={{ color: INK }}>Choose an application</h1>
        <p className="text-sm text-gray-500 mt-1.5">Each tool is self-contained - its own memory, personalization, and exports.</p>
      </div>
      {/* Main Chat - the Toolbox home */}
      <button onClick={() => setApp("chat")} className="group relative z-10 w-full max-w-4xl rounded-3xl border bg-white p-6 text-left transition-all duration-300 hover:-translate-y-1.5 overflow-hidden mb-5" style={{ borderColor: "#e5e7eb", boxShadow: "0 1px 3px rgba(0,0,0,.06)", animation: "fadeUp .5s ease .06s both" }}>
        <span className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none" style={{ background: `radial-gradient(circle at 50% 0%, rgba(${TB.rgb},.08), transparent 70%)` }} />
        <div className="relative flex items-center gap-5">
          <span style={{ filter: `drop-shadow(0 6px 16px rgba(${TB.rgb},.42))` }}><EngineOrb px={56} T={TB} /></span>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <div className="text-lg font-bold" style={{ color: INK }}>Main Chat</div>
              <span className="text-[9px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full" style={{ background: TB.lighter, color: TB.dark }}>Home</span>
            </div>
            <p className="text-xs text-gray-500 mt-1">Will's everyday Claude chat - ask anything, draft emails, plan the day. Saved chats, model picker, and New Chat live here.</p>
          </div>
          <div className="hidden sm:flex items-center gap-1.5 text-sm font-semibold shrink-0" style={{ color: TB.accent }}>Open Main Chat <ChevronRight size={16} className="transition-transform group-hover:translate-x-1" /></div>
        </div>
        <span className="absolute inset-x-0 bottom-0 h-1 transition-opacity duration-300 opacity-0 group-hover:opacity-100" style={{ background: `linear-gradient(90deg, ${TB.light}, ${TB.accent})` }} />
      </button>
      <div className="relative z-10 grid grid-cols-1 sm:grid-cols-3 gap-5 w-full max-w-4xl">
        {APPS.map((c, i) => (
          <button key={c.id} onClick={() => setApp(c.id)} className="group relative rounded-3xl border bg-white p-6 text-left transition-all duration-300 hover:-translate-y-1.5 overflow-hidden" style={{ borderColor: "#e5e7eb", boxShadow: "0 1px 3px rgba(0,0,0,.06)", animation: `fadeUp .5s ease ${0.12 + i * 0.08}s both` }}>
            <span className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none" style={{ background: `radial-gradient(circle at 50% 0%, rgba(${c.theme.rgb},.07), transparent 70%)` }} />
            <div className="relative flex items-center gap-4 mb-4">
              <span style={{ filter: `drop-shadow(0 6px 16px rgba(${c.theme.rgb},.42))` }}><EngineOrb px={56} processing={false} active={false} T={c.theme} /></span>
              <div>
                <div className="text-lg font-bold" style={{ color: INK }}>{c.appName}</div>
                <div className="text-[10px] uppercase tracking-wider font-bold" style={{ color: c.theme.accent }}>{c.noun} workflow</div>
              </div>
            </div>
            <p className="relative text-xs text-gray-500 leading-relaxed">Draft, organize, and refine {c.noun}s - PDF analysis, project memory, three-layer personalization, and copy-ready output.</p>
            <div className="relative mt-4 flex items-center gap-1.5 text-sm font-semibold" style={{ color: c.theme.accent }}>Open {c.appName} <ChevronRight size={16} className="transition-transform group-hover:translate-x-1" /></div>
            <span className="absolute inset-x-0 bottom-0 h-1 transition-opacity duration-300 opacity-0 group-hover:opacity-100" style={{ background: `linear-gradient(90deg, ${c.theme.light}, ${c.theme.accent})` }} />
          </button>
        ))}
      </div>
      <div className="relative z-10 mt-10 text-[10px] uppercase tracking-[0.25em] text-gray-300">By Will Eckstrom</div>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<Toolbox />);
  </script>
</body>
</html>
